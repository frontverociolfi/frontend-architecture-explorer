<main class="app-shell">
  <header class="app-header">
    <nav class="top-menu" [attr.aria-label]="'app.nav.aria' | translate">
      <a
        routerLink="/"
        fragment="arquiteturas"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ 'app.nav.architectures' | translate }}
      </a>
      <a routerLink="/simulador" routerLinkActive="active">{{ 'app.nav.advisor' | translate }}</a>
      <a routerLink="/comparador" routerLinkActive="active">{{ 'app.nav.comparison' | translate }}</a>
    </nav>

    <app-language-toggle />
  </header>

  <router-outlet />

  <footer class="app-footer">
    {{ 'app.footer.credit' | translate }}
  </footer>
</main>
